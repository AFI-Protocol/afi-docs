name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: echo "CI workflow initialized"

  stale-refs:
    name: No references to removed machinery
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Check the tracked tree for removed implementation machinery
        run: python3 scripts/check_stale_refs.py

  architecture-doc:
    name: Full-architecture doc is current
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Check AFI_Full_Architecture.md is present-tense and current
        run: python3 scripts/check_architecture_doc.py

  atlas-summary:
    name: Architecture doc agrees with the Atlas registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Check AFI_Full_Architecture.md matches afi.protocol-atlas.v1
        run: python3 scripts/check_atlas_summary.py
